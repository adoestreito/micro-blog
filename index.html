<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>blog — feed</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
  <header>
    <h1>~/blog</h1>
    <nav>
      <a href="https://www.adoestreito.com/" class="nav-home" title="www.adoestreito.com" aria-label="Home — adoestreito.com" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-home-slash">/</span>
      </a>
      <a href="index.html">feed</a>
    </nav>
  </header>

  <p class="prompt">cat posts.json | head -n *</p>

  <ul class="post-list" id="feed"></ul>

  <script>
    const LONG_THRESHOLD = 500; // chars - longer posts get their own page

    fetch('posts.json')
      .then(r => r.json())
      .then(posts => {
        posts.sort((a, b) => new Date(b.date) - new Date(a.date));
        const ul = document.getElementById('feed');
        posts.forEach(post => {
          const li = document.createElement('li');
          li.className = 'post-item';
          const isLong = post.content.length > LONG_THRESHOLD;
          const excerpt = isLong
            ? post.content.slice(0, 300).trim() + '...'
            : post.content;
          li.innerHTML = `
            <h2>${escapeHtml(post.title)}</h2>
            <div class="post-meta">${post.date}</div>
            <div class="post-excerpt">${sanitizeHtml(excerpt)}</div>
            ${isLong ? `<a href="post.html?id=${post.id}" class="read-more">read more →</a>` : ''}
          `;
          ul.appendChild(li);
        });
      })
      .catch(() => {
        document.getElementById('feed').innerHTML =
          '<li class="error">Failed to load posts. Is posts.json present?</li>';
      });

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function sanitizeHtml(s) {
      return DOMPurify.sanitize(s, { ALLOWED_TAGS: ['a', 'strong', 'em', 'b', 'i', 'u', 'br', 'code', 'p'] });
    }
  </script>
</body>
</html>
