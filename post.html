<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>blog — post</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
  <header>
    <h1>~/blog</h1>
    <nav>
      <a href="https://www.adoestreito.com/" class="nav-home" title="www.adoestreito.com" aria-label="Home — adoestreito.com" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-home-slash">/</span>
      </a>
      <a href="index.html">feed</a>
    </nav>
  </header>

  <main id="content"></main>

  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    if (!id) {
      document.getElementById('content').innerHTML =
        '<p class="error">No post id. <a href="index.html">Back to feed</a></p>';
    } else {
      fetch('posts.json')
        .then(r => r.json())
        .then(posts => {
          const post = posts.find(p => p.id === id);
          if (!post) {
            document.getElementById('content').innerHTML =
              '<p class="error">Post not found. <a href="index.html">Back to feed</a></p>';
            return;
          }
          document.title = `blog — ${post.title}`;
          document.getElementById('content').innerHTML = `
            <p class="prompt">cat posts.json | grep "${escapeHtml(post.id)}"</p>
            <article>
              <h1>${escapeHtml(post.title)}</h1>
              <div class="meta">${post.date}</div>
              <div class="content">${sanitizeHtml(post.content)}</div>
              <p style="margin-top:1.5rem"><a href="index.html">← back to feed</a></p>
            </article>
          `;
        })
        .catch(() => {
          document.getElementById('content').innerHTML =
            '<p class="error">Failed to load post. <a href="index.html">Back to feed</a></p>';
        });
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function sanitizeHtml(s) {
      return DOMPurify.sanitize(s, {
        ALLOWED_TAGS: ['a', 'strong', 'em', 'b', 'i', 'u', 'br', 'code', 'p'],
        ADD_TAGS: ['audio', 'source'],
        ADD_ATTR: ['src', 'type', 'controls', 'preload', 'crossorigin', 'loop', 'muted', 'class', 'title']
      });
    }
  </script>
</body>
</html>
